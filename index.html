<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrewMind Kiosk | Artisan Coffee</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5efe6;
    --espresso: #1a0a00;
    --caramel: #c07b2a;
    --gold: #e8b84b;
    --foam: #fdf6ec;
    --warm-gray: #8a7968;
    --accent: #d4521a;
    --glass: rgba(255, 255, 255, 0.05);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--espresso);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .kiosk-container {
    width: 100%;
    max-width: 800px;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
    padding-top: 20px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: -1px;
  }

  .logo span { color: var(--cream); }

  .section-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Menu Styles */
  .menu-filters {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
    overflow-x: auto;
    padding-bottom: 10px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--warm-gray);
    color: var(--warm-gray);
    padding: 6px 18px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: 0.2s;
  }

  .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--espresso);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }

  .item-card {
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 18px;
    padding: 20px;
    transition: 0.3s;
    cursor: pointer;
  }

  .item-card:hover {
    background: rgba(255,255,255,0.08);
    border-color: var(--caramel);
    transform: translateY(-3px);
  }

  .price { color: var(--gold); font-weight: 700; margin-top: 10px; }

  /* Size Selection Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
  }

  .modal {
    background: var(--espresso);
    border: 1px solid var(--gold);
    border-radius: 24px;
    padding: 30px;
    width: 90%;
    max-width: 400px;
    text-align: center;
  }

  .size-options {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin: 20px 0;
  }

  .size-btn {
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--cream);
    padding: 15px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    justify-content: space-between;
    transition: 0.2s;
  }

  .size-btn:hover {
    background: var(--caramel);
    border-color: var(--gold);
  }

  /* Cart Panel */
  .cart-container {
    margin-top: 40px;
    background: rgba(0,0,0,0.2);
    border-radius: 24px;
    padding: 24px;
  }

  .order-btn {
    width: 100%;
    padding: 18px;
    background: var(--gold);
    color: var(--espresso);
    border: none;
    border-radius: 14px;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.2rem;
    cursor: pointer;
    margin-top: 20px;
  }

  .order-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Success Overlay */
  .success-overlay {
    position: fixed;
    inset: 0;
    background: var(--espresso);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 3000;
  }
</style>
</head>
<body>

<div class="kiosk-container">
  <header>
    <div class="logo">Brew<span>Mind</span></div>
    <p style="color: var(--warm-gray); letter-spacing: 2px;">CHOOSE YOUR SIZE & BLEND</p>
  </header>

  <div class="menu-filters">
    <button class="filter-btn active" onclick="filterMenu('all', this)">All</button>
    <button class="filter-btn" onclick="filterMenu('coffee', this)">Coffee</button>
    <button class="filter-btn" onclick="filterMenu('cold', this)">Cold Brew</button>
    <button class="filter-btn" onclick="filterMenu('special', this)">Signatures</button>
  </div>

  <div class="grid" id="menuGrid"></div>

  <div class="cart-container">
    <div class="section-label">Current Order</div>
    <div id="cartList"></div>
    <div id="totalDisplay" style="text-align:right; font-size:1.4rem; font-family:'Playfair Display'; margin-top:15px; display:none">
      Total: <span id="totalValue" style="color:var(--gold)">R0.00</span>
    </div>
    <button class="order-btn" id="mainOrderBtn" disabled onclick="checkout()">Confirm Order</button>
  </div>
</div>

<div class="modal-overlay" id="sizeModal">
  <div class="modal">
    <h2 id="modalDrinkName" style="font-family:'Playfair Display'; margin-bottom: 5px;">Drink Name</h2>
    <p style="color: var(--warm-gray); font-size: 0.9rem; margin-bottom: 20px;">Select your preferred size</p>
    <div class="size-options">
      <button class="size-btn" onclick="confirmSize('Small', 0)">
        <span>Small (250ml)</span> <span>+R0</span>
      </button>
      <button class="size-btn" onclick="confirmSize('Medium', 5)">
        <span>Medium (350ml)</span> <span>+R5</span>
      </button>
      <button class="size-btn" onclick="confirmSize('Large', 10)">
        <span>Large (450ml)</span> <span>+R10</span>
      </button>
    </div>
    <button onclick="closeModal()" style="background:none; border:none; color:var(--warm-gray); cursor:pointer;">Cancel</button>
  </div>
</div>

<div class="success-overlay" id="successScreen">
  <div style="font-size: 4rem;">☕</div>
  <h1 style="font-family:'Playfair Display'; font-size: 3rem; color: var(--gold);">Perfect!</h1>
  <p id="orderRef" style="font-size: 1.5rem; margin: 20px 0;"></p>
  <button class="filter-btn active" style="padding: 10px 40px" onclick="location.reload()">New Order</button>
</div>

<script>
const DATA = [
  { id: 1, name: 'Double Espresso', price: 28, cat: 'coffee', icon: '☕' },
  { id: 2, name: 'Flat White', price: 38, cat: 'coffee', icon: '🥛' },
  { id: 3, name: 'Iced Americano', price: 32, cat: 'cold', icon: '🧊' },
  { id: 4, name: 'Nitro Cold Brew', price: 45, cat: 'cold', icon: '⚡' },
  { id: 5, name: 'Honey Lavender Latte', price: 52, cat: 'special', icon: '🍯' },
  { id: 6, name: 'The Midnight Mocha', price: 55, cat: 'special', icon: '🌙' }
];

let cart = [];
let pendingItem = null;

function renderMenu(filter = 'all') {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '';
  const items = filter === 'all' ? DATA : DATA.filter(i => i.cat === filter);
  
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.onclick = () => openSizeModal(item);
    card.innerHTML = `
      <div style="font-size: 1.8rem">${item.icon}</div>
      <div style="font-weight:500; margin-top:10px">${item.name}</div>
      <div class="price">From R${item.price}.00</div>
    `;
    grid.appendChild(card);
  });
}

function openSizeModal(item) {
  pendingItem = item;
  document.getElementById('modalDrinkName').innerText = item.name;
  document.getElementById('sizeModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('sizeModal').style.display = 'none';
  pendingItem = null;
}

function confirmSize(sizeLabel, upcharge) {
  const finalItem = {
    ...pendingItem,
    size: sizeLabel,
    finalPrice: pendingItem.price + upcharge,
    uniqueId: Date.now()
  };
  cart.push(finalItem);
  updateCart();
  closeModal();
}

function filterMenu(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMenu(cat);
}

function updateCart() {
  const list = document.getElementById('cartList');
  const totalDisplay = document.getElementById('totalDisplay');
  const orderBtn = document.getElementById('mainOrderBtn');
  
  if(cart.length === 0) {
    list.innerHTML = '<p style="color:var(--warm-gray)">Your cup is empty...</p>';
    totalDisplay.style.display = 'none';
    orderBtn.disabled = true;
    return;
  }

  list.innerHTML = cart.map((item, idx) => `
    <div style="display:flex; justify-content:space-between; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.05)">
      <div>
        <div style="font-weight:500">${item.name}</div>
        <div style="font-size:0.75rem; color:var(--gold)">Size: ${item.size}</div>
      </div>
      <div style="display:flex; align-items:center">
        <span>R${item.finalPrice}.00</span>
        <button onclick="removeItem(${idx})" style="background:none; border:none; color:var(--accent); cursor:pointer; margin-left:12px; font-size:1.1rem">✕</button>
      </div>
    </div>
  `).join('');

  const total = cart.reduce((sum, item) => sum + item.finalPrice, 0);
  document.getElementById('totalValue').innerText = `R${total}.00`;
  totalDisplay.style.display = 'block';
  orderBtn.disabled = false;
}

function removeItem(idx) {
  cart.splice(idx, 1);
  updateCart();
}

function checkout() {
  const ref = Math.floor(Math.random() * 900) + 100;
  document.getElementById('orderRef').innerText = `Your Number: #${ref}`;
  document.getElementById('successScreen').style.display = 'flex';
}

renderMenu();
</script>
</body>
</html>
