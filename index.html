npm install<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deja Brew | Coffee & Snacks</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --cream:#f6f1e8;
  --espresso:#120800;
  --gold:#e8b84b;
  --glass:rgba(255,255,255,0.06);
  --warm:#9a8a7a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'DM Sans',sans-serif;
  background:radial-gradient(circle at top,#1a0a00,#0d0500);
  color:var(--cream);
  min-height:100vh;
}

.container{max-width:900px;margin:auto;padding:24px;}

header{text-align:center;margin-bottom:25px;}

.logo{
  font-family:'Playfair Display',serif;
  font-size:3rem;
  color:var(--gold);
}
.logo span{color:var(--cream);}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
  overflow-x:auto;
  margin-bottom:20px;
}

.tabs button{
  background:transparent;
  border:1px solid var(--warm);
  color:var(--warm);
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}

.tabs button.active{
  background:var(--gold);
  color:black;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
}

/* CARD */
.card{
  background:var(--glass);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:16px;
  cursor:pointer;
  transition:.25s;
}

.card:hover{
  transform:translateY(-5px);
  border-color:var(--gold);
}

.price{color:var(--gold);margin-top:6px;font-weight:700}

/* CART */
.cart{
  margin-top:30px;
  background:rgba(0,0,0,0.35);
  padding:18px;
  border-radius:16px;
}

.total{
  text-align:right;
  margin-top:10px;
  color:var(--gold);
  font-size:1.2rem;
}

.order{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  background:var(--gold);
  color:black;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<header>
  <div class="logo">Deja <span>Brew</span></div>
</header>

<!-- 🟡 TABS -->
<div class="tabs">
  <button class="active" onclick="setFilter('all', this)">All</button>
  <button onclick="setFilter('coffee', this)">Coffee</button>
  <button onclick="setFilter('cold', this)">Cold Brew</button>
  <button onclick="setFilter('signature', this)">Signature</button>
  <button onclick="setFilter('snacks', this)">Snacks 🍪</button>
</div>

<!-- MENU -->
<div class="grid" id="grid"></div>

<!-- CART -->
<div class="cart">
  <div id="cart"></div>
  <div class="total" id="total">Total: R0</div>
  <button class="order" onclick="confirmOrder()">Confirm Order</button>
</div>

</div>

<script>

/* ☕ + 🍪 FULL MENU DATA */
const items = [
  {name:"Espresso", price:28, cat:"coffee"},
  {name:"Flat White", price:38, cat:"coffee"},
  {name:"Cappuccino", price:40, cat:"coffee"},

  {name:"Iced Americano", price:32, cat:"cold"},
  {name:"Nitro Brew", price:50, cat:"cold"},

  {name:"Vanilla Latte", price:45, cat:"signature"},
  {name:"Caramel Macchiato", price:48, cat:"signature"},

  {name:"Chocolate Croissant", price:25, cat:"snacks"},
  {name:"Blueberry Muffin", price:22, cat:"snacks"},
  {name:"Cinnamon Roll", price:28, cat:"snacks"},
  {name:"Butter Cookie Box", price:30, cat:"snacks"},
  {name:"Brownie Bite", price:18, cat:"snacks"}
];

let cart = [];

/* 🔥 RENDER MENU */
function render(filter="all"){
  const g = document.getElementById("grid");
  g.innerHTML="";

  const filtered = filter==="all"
    ? items
    : items.filter(i=>i.cat===filter);

  filtered.forEach(i=>{
    const d=document.createElement("div");
    d.className="card";

    d.innerHTML=`
      <div style="font-size:1.4rem">☕🍪</div>
      <div style="margin-top:10px;font-weight:500">${i.name}</div>
      <div class="price">R${i.price}</div>
    `;

    d.onclick=()=>{
      cart.push(i);
      update();
    };

    g.appendChild(d);
  });
}

/* 🟡 FILTER */
function setFilter(type, btn){
  document.querySelectorAll(".tabs button")
    .forEach(b=>b.classList.remove("active"));

  btn.classList.add("active");
  render(type);
}

/* 🧾 CART */
function update(){
  const c=document.getElementById("cart");
  const t=document.getElementById("total");

  c.innerHTML=cart.map(x=>`
    <div>${x.name} - R${x.price}</div>
  `).join("");

  let total = cart.reduce((a,b)=>a+b.price,0);
  t.innerText="Total: R"+total;
}

/* ✅ CONFIRM ORDER */
function confirmOrder(){
  if(cart.length === 0){
    alert("Your cart is empty.");
    return;
  }

  alert("Order confirmed! ☕");

  cart = [];
  update();
}

/* INIT */
render();

</script>

</body>
</html>
