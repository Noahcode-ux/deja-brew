<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dejai Brew | Artisan Coffee</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --cream:#f6f1e8;
  --espresso:#120800;
  --gold:#e8b84b;
  --glass:rgba(255,255,255,0.06);
  --warm:#9a8a7a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'DM Sans',sans-serif;
  color:var(--cream);
  overflow-x:hidden;
  background:black;
}

/* 🎥 BACKGROUND ESPRESSO MACHINE LOOP */
.bg-video{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.25;
  z-index:-2;
  filter:contrast(1.2) brightness(0.6);
}

/* dark overlay */
.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top,#1a0a00,#050201);
  z-index:-1;
}

/* container */
.container{
  max-width:900px;
  margin:auto;
  padding:24px;
}

/* HEADER */
header{text-align:center;margin-bottom:20px;}

.logo{
  font-family:'Playfair Display',serif;
  font-size:3rem;
  color:var(--gold);
}
.logo span{color:var(--cream);}

/* ☕ STEAM FOLLOW CURSOR */
#steam{
  position:fixed;
  width:12px;
  height:12px;
  background:rgba(255,255,255,0.4);
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  filter:blur(2px);
  z-index:10;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%,100%{opacity:.3;transform:scale(1)}
  50%{opacity:.8;transform:scale(1.6)}
}

/* filters */
.filters{
  display:flex;
  gap:10px;
  overflow-x:auto;
  margin-bottom:20px;
}

.filters button{
  background:transparent;
  border:1px solid var(--warm);
  color:var(--warm);
  padding:8px 16px;
  border-radius:20px;
  cursor:pointer;
}

.filters .active{
  background:var(--gold);
  color:black;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:16px;
}

/* card */
.card{
  background:var(--glass);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:18px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px);
}

/* 🪄 LIQUID FILL */
.fill::after{
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:0%;
  background:linear-gradient(to top, rgba(232,184,75,0.4), transparent);
  animation:fill 0.6s ease-out;
}

@keyframes fill{
  from{height:0%;}
  to{height:100%;}
}

/* 🧋 3D CUP */
.scene{perspective:900px;}

.cup3d{
  width:60px;
  height:70px;
  margin:auto;
  transform-style:preserve-3d;
  animation:float 3s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translateY(0) rotateY(0)}
  50%{transform:translateY(-5px) rotateY(180deg)}
}

.cup{
  width:40px;
  height:45px;
  background:linear-gradient(#3b1f10,#1a0a00);
  border-radius:10px;
  position:absolute;
  bottom:0;
  left:10px;
}

.handle{
  width:18px;
  height:18px;
  border:3px solid var(--gold);
  border-radius:50%;
  position:absolute;
  right:-10px;
  top:18px;
}

.liquid{
  width:34px;
  height:10px;
  background:var(--gold);
  position:absolute;
  bottom:40px;
  left:13px;
  border-radius:50%;
}

/* cart */
.cart{
  margin-top:30px;
  background:rgba(0,0,0,0.4);
  padding:18px;
  border-radius:18px;
}

.total{
  text-align:right;
  margin-top:10px;
  color:var(--gold);
  font-size:1.2rem;
}

.order{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  background:var(--gold);
  color:black;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 🎥 ESPRESSO MACHINE VIDEO BACKGROUND -->
<video class="bg-video" autoplay muted loop>
  <source src="https://cdn.coverr.co/videos/coverr-coffee-machine-espresso-1720/1080p.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- ☕ STEAM CURSOR -->
<div id="steam"></div>

<div class="container">

<header>
  <div class="logo">Dejai <span>Brew</span></div>
</header>

<div class="filters">
  <button class="active">All</button>
  <button>Coffee</button>
  <button>Cold</button>
  <button>Signature</button>
</div>

<div class="grid" id="grid"></div>

<div class="cart">
  <div id="cart"></div>
  <div class="total" id="total">Total: R0</div>
  <button class="order">Confirm Order</button>
</div>

</div>

<script>

const items=[
 {name:"Espresso",price:28},
 {name:"Flat White",price:38},
 {name:"Cappuccino",price:40},
 {name:"Latte",price:45},
 {name:"Iced Americano",price:32},
 {name:"Nitro Brew",price:50}
];

let cart=[];

/* render menu */
function render(){
 const g=document.getElementById("grid");
 g.innerHTML="";

 items.forEach(i=>{
  const d=document.createElement("div");
  d.className="card";

  d.innerHTML=`
   <div class="scene">
    <div class="cup3d">
      <div class="cup"></div>
      <div class="liquid"></div>
      <div class="handle"></div>
    </div>
   </div>
   <div style="margin-top:10px">${i.name}</div>
   <div style="color:var(--gold)">R${i.price}</div>
  `;

  d.onclick=()=>{

    /* 🪄 liquid fill animation */
    d.classList.add("fill");
    setTimeout(()=>d.classList.remove("fill"),600);

    cart.push(i);
    update();
  };

  g.appendChild(d);
 });
}

/* cart */
function update(){
 const c=document.getElementById("cart");
 const t=document.getElementById("total");

 c.innerHTML=cart.map(x=>`<div>${x.name} - R${x.price}</div>`).join("");

 let total=cart.reduce((a,b)=>a+b.price,0);
 t.innerText="Total: R"+total;
}

render();

/* ☕ steam follows mouse */
const steam=document.getElementById("steam");

document.addEventListener("mousemove",(e)=>{
 steam.style.left=e.clientX+"px";
 steam.style.top=e.clientY+"px";
});

</script>

</body>
</html>
